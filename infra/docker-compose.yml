services:
  postgres:
    image: postgres:16-alpine
    container_name: order-api-db
    environment:
      POSTGRES_USER: order_api
      POSTGRES_PASSWORD: order_api
      POSTGRES_DB: order_api
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
